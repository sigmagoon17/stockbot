name: Daily Option Scanner

on:
  schedule:
    - cron: "45 14 * * 1-5"
    - cron: "45 17 * * 1-5"
    - cron: "45 19 * * 1-5"
  workflow_dispatch:

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update expiration results
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python update_history.py

      - name: Scan watchlist and save candidates
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: https://paper-api.alpaca.markets
          ALPACA_DATA_FEED: iex
          ALPACA_AUTO_PAPER_TRADE: ${{ secrets.ALPACA_AUTO_PAPER_TRADE }}
          ALPACA_PAPER_TRADE_LIMIT: ${{ secrets.ALPACA_PAPER_TRADE_LIMIT }}
          ALPACA_PAPER_TRADE_QUANTITY: ${{ secrets.ALPACA_PAPER_TRADE_QUANTITY }}
          SCAN_TICKERS: AAPL,SPY,QQQ,NVDA,MSFT,COHR
          SCAN_OUTLOOK: neutral
          SCAN_MAX_RISK: "500"
          SCAN_RISK_TOLERANCE: moderate
        run: python scheduled_scan.py
